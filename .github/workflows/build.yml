name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Finance/Finance.sln

      - name: Build
        run: dotnet build Finance/Finance.sln -c Release --no-restore

      - name: Package
        run: |
          Compress-Archive -Path Finance/release/server/* -DestinationPath server-windows.zip
          Compress-Archive -Path Finance/release/client/* -DestinationPath client-windows.zip

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-windows
          path: server-windows.zip

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-windows
          path: client-windows.zip

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        runtime: [osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Finance/Finance/Finance.csproj -r ${{ matrix.runtime }} -p:TargetFramework=net8.0 -p:UseWindowsForms=false

      - name: Publish
        run: dotnet publish Finance/Finance/Finance.csproj -c Release -r ${{ matrix.runtime }} -p:TargetFramework=net8.0 -p:UseWindowsForms=false -p:PlatformTarget=AnyCPU --self-contained --no-restore -o publish/${{ matrix.runtime }}

      - name: Package
        run: zip -r server-${{ matrix.runtime }}.zip publish/${{ matrix.runtime }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.runtime }}
          path: server-${{ matrix.runtime }}.zip

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server-windows.zip
            client-windows.zip
            server-osx-x64.zip
            server-osx-arm64.zip
