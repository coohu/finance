name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Finance/Finance.sln

      - name: Build
        run: dotnet build Finance/Finance.sln -c Release --no-restore

      - name: Package
        run: |
          Compress-Archive -Path Finance/release/server/* -DestinationPath server-${{ github.ref_name }}.zip
          Compress-Archive -Path Finance/release/client/* -DestinationPath client-${{ github.ref_name }}.zip

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ github.ref_name }}
          path: Finance/release/server/

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ github.ref_name }}
          path: Finance/release/client/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server-${{ github.ref_name }}.zip
            client-${{ github.ref_name }}.zip
