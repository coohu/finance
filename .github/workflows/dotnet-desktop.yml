name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Finance/Finance.sln

      - name: Build
        run: dotnet build Finance/Finance.sln -c Release --no-restore

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ github.ref_name }}
          path: Finance/release/server/

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ github.ref_name }}
          path: Finance/release/client/
